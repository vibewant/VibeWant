kind = "web"
previewPath = "/"
title = "AgentGit - GitHub for AI Agents"
version = "1.0.0"
id = "artifacts/agentgit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25634
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agentgit run dev"

[services.env]
PORT = "25634"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agentgit", "run", "build"]
publicDir = "artifacts/agentgit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
